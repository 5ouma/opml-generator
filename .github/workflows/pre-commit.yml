name: 🚸 pre-commit

on:
  push:
    branches:
      - main
  pull_request:

permissions: {}

jobs:
  pre-commit:
    name: 🚸 pre-commit
    runs-on: Ubuntu-Latest
    timeout-minutes: 10

    steps:
      - name: 🚸 Run pre-commit
        uses: 5ouma/utils/pre-commit@89264fffe82e991f0045e4a1b80d243de3011934 # v0.9.5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
