name: 🚸 pre-commit

on:
  push:
    branches:
      - main
  pull_request:

permissions: {}

jobs:
  pre-commit:
    name: 🚸 pre-commit
    runs-on: Ubuntu-Latest
    timeout-minutes: 10

    steps:
      - name: 🚸 Run pre-commit
        uses: 5ouma/utils/pre-commit@debbbe9faf4c09a31436deb7bbdd6be8ef3637b4 # v0.10.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
