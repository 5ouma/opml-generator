name: 🚸 pre-commit

on:
  push:
    branches:
      - main
  pull_request:

permissions: {}

jobs:
  pre-commit:
    name: 🚸 pre-commit
    runs-on: Ubuntu-Latest
    timeout-minutes: 10

    steps:
      - name: 🚸 Run pre-commit
        uses: 5ouma/utils/pre-commit@c9c3ab35f0a7966a0858c71067b71248e5873e6c # v0.11.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
