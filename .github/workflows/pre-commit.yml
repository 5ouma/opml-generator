name: 🚸 pre-commit

on:
  push:
    branches:
      - main
  pull_request:

permissions: {}

jobs:
  pre-commit:
    name: 🚸 pre-commit
    runs-on: Ubuntu-Latest
    timeout-minutes: 5

    steps:
      - name: 🚸 Run pre-commit
        uses: 5ouma/utils/pre-commit@d7317adbd74c0d1b71a31b01c3d28a08be25c932 # v0.9.3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
