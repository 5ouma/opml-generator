name: 🚸 pre-commit

on:
  push:
    branches:
      - main
  pull_request:

permissions: {}

jobs:
  pre-commit:
    name: 🚸 pre-commit
    runs-on: Ubuntu-Latest
    timeout-minutes: 3

    steps:
      - name: 🚸 Run pre-commit
        uses: 5ouma/utils/pre-commit@311e27d5690f66c3dcb1826578cadecb13948212 # v0.7.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
