name: 🚸 pre-commit

on:
  push:
    branches:
      - main
  pull_request:

permissions: {}

jobs:
  pre-commit:
    name: 🚸 pre-commit
    runs-on: Ubuntu-Latest
    timeout-minutes: 10

    steps:
      - name: 🚸 Run pre-commit
        uses: 5ouma/utils/pre-commit@5ebadf62324d3fec854840e276b52a8f2b04a5d0 # v0.11.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
