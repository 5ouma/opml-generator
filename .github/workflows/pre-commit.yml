name: 🚸 pre-commit

on:
  push:
    branches:
      - main
  pull_request:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  pre-commit:
    name: 🚸 pre-commit
    runs-on: Ubuntu-Latest
    timeout-minutes: 10

    steps:
      - name: 🚸 Run pre-commit
        uses: 5ouma/utils/pre-commit@2a983b8b09b7c8cb777133f087bfdde24e8ecf75 # v0.12.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
