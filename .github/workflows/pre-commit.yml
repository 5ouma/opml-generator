name: 🚸 pre-commit

on:
  push:
    branches:
      - main
  pull_request:

permissions: {}

jobs:
  pre-commit:
    name: 🚸 pre-commit
    runs-on: Ubuntu-Latest
    timeout-minutes: 10

    steps:
      - name: 🚸 Run pre-commit
        uses: 5ouma/utils/pre-commit@e7cf7a62cbf6353c7b9667884a54d9a3e93ae2af # v0.9.4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
