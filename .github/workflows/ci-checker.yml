name: ✅ CI Checker

on:
  pull_request:

permissions: {}

jobs:
  merge-gatekeeper:
    name: 🛡️ Merge Gatekeeper
    permissions:
      checks: read
      statuses: read
    runs-on: Ubuntu-Latest
    timeout-minutes: 10

    steps:
      - name: 🛡️ Run Merge Gatekeeper
        uses: upsidr/merge-gatekeeper@09af7a82c1666d0e64d2bd8c01797a0bcfd3bb5d # v1.2.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          self: 🛡️ Merge Gatekeeper
          ignored: CodeRabbit

  merge-pr:
    name: 🔀 Merge PR
    needs: merge-gatekeeper
    if: ${{ github.event.pull_request.user.login == 'renovate[bot]' && github.event.sender.login == 'autofix-ci[bot]' && toJson(github.event.pull_request.requested_reviewers) == '[]' }}
    runs-on: Ubuntu-Slim
    environment: CI-Checker
    timeout-minutes: 1

    steps:
      - name: 💳 Create GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.PRIVATE_KEY }}
          permission-contents: write
          permission-pull-requests: write

      - name: 🔀 Squash merge PR
        run: gh pr merge --repo="$GITHUB_REPOSITORY" "$GITHUB_HEAD_REF" --squash
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}

  rebase-pr:
    name: 🔄 Rebase PR
    permissions:
      pull-requests: write
    needs: merge-pr
    if: ${{ failure() }}
    runs-on: Ubuntu-Slim
    timeout-minutes: 1

    steps:
      - name: 🚚 Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: 🔄 Rebase PR
        run: gh pr edit "$GITHUB_HEAD_REF" --body "$(gh pr view "$GITHUB_HEAD_REF" --json=body --jq='.body' | sed 's/- \[ \] <!-- rebase-check -->/- [x] <!-- rebase-check -->/')"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
