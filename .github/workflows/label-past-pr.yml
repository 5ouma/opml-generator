name: 🏷️ Label Past Pull Requests

on:
  pull_request:
    types: [closed]

permissions: {}

jobs:
  label-past-pr:
    name: 🏷️ Label Past Pull Requests
    permissions:
      pull-requests: write
    if: ${{ github.event.pull_request.user.login == 'renovate[bot]' && github.event.pull_request.merged }}
    runs-on: Ubuntu-Slim
    timeout-minutes: 1

    steps:
      - name: 🏷️ Add label to past Pull Requests
        uses: 5ouma/utils/label-past-pr@c9c3ab35f0a7966a0858c71067b71248e5873e6c # v0.11.1
        with:
          label: 🕰️ Past Dependencies
