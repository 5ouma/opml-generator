name: 🏷️ Label Past Pull Requests

on:
  pull_request:
    types: [closed]

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  label-past-pr:
    name: 🏷️ Label Past Pull Requests
    permissions:
      pull-requests: write
    if: ${{ github.event.pull_request.user.login == 'renovate[bot]' && github.event.pull_request.merged }}
    runs-on: Ubuntu-Slim
    timeout-minutes: 1

    steps:
      - name: 🏷️ Add label to past Pull Requests
        uses: 5ouma/utils/label-past-pr@bef1602ec7e587127ade273d6490f359c6fea95b # v0.12.3
        with:
          label: 🕰️ Past Dependencies
