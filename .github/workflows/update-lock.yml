name: autofix.ci

on:
  pull_request:
    paths:
      - deno.json

permissions: {}

jobs:
  update-lock:
    name: 🔒 Update Lock File
    if: ${{ github.event.pull_request.user.login == 'renovate[bot]' }}
    runs-on: Ubuntu-Slim
    timeout-minutes: 1

    steps:
      - name: 🚚 Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: 🔒 Update lock file
        uses: 5ouma/utils/update-deno-lock-file@d7317adbd74c0d1b71a31b01c3d28a08be25c932 # v0.9.3
