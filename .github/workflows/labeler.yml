name: 🏷️ Labeler

on:
  pull_request:

permissions: {}

jobs:
  labeler:
    name: 🏷️ Labeler
    permissions:
      pull-requests: write
    runs-on: Ubuntu-Slim
    timeout-minutes: 1

    steps:
      - name: 🏷️ Add labels to PR
        uses: fuxingloh/multi-labeler@bcd50af464202999e57f556b4aefcf05a34abf85 # v5.0.0
        with:
          config-repo: 5ouma/utils
